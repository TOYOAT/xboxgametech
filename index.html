<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox Performance Wiki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Główny układ strony -->
    <div class="wiki-layout">
        
        <!-- PASEK BOCZNY (ZAKŁADKA) -->
        <nav class="main-sidebar">
            <button class="nav-toggle-btn" onclick="toggleGameList()">
                <span class="icon">🎮</span>
                <span class="label">GRY</span>
            </button>
            <div id="game-list-overlay" class="game-list-panel">
                <h3>Wybierz tytuł:</h3>
                <div id="game-buttons-container">
                    <!-- Przyciski gier wygenerowane przez JS -->
                </div>
            </div>
        </nav>

        <!-- OBSZAR WYŚWIETLANIA KARTY -->
        <main class="card-display-area" onclick="closeGameList()">
            <div class="game-card" id="active-card">
                
                <div class="card-header">
                    <div class="title-section">
                        <h1 id="v-title">Xbox Performance Wiki</h1>
                        <p id="v-version" class="subtitle">Wybierz grę z menu po lewej</p>
                    </div>
                    <div id="v-badge" class="status-badge badge-green">Ready</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Input Lag</span>
                        <span id="v-lag" class="stat-value">--</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Framerate</span>
                        <span id="v-fps" class="stat-value">--</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Deadzone</span>
                        <span id="v-deadzone" class="stat-value">--</span>
                    </div>
                </div>

                <div class="card-body">
                    <h2 class="section-title text-green">// Status Projektu</h2>
                    <p id="v-desc">Kliknij w ikonę pada po lewej, aby otworzyć listę przetestowanych gier.</p>
                    
                    <div id="v-fix-container" class="fix-box" style="display:none;">
                        <h2 class="section-title text-green-light">// Zalecane Ustawienia</h2>
                        <ul id="v-fix" class="fix-list"></ul>
                    </div>
                </div>

                <div class="card-footer">
                    <span>Ostatnia aktualizacja: 2024</span>
                    <button class="btn-report">Zgłoś dane</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const db = {
            "dishonored": {
                title: "Dishonored 2", version: "Xbox One / Series X", badge: "Bad Controls", bColor: "badge-red",
                lag: "Heavy", lagC: "text-red", fps: "60 FPS", dz: "Large", dzC: "text-yellow",
                desc: "Pływające sterowanie i zauważalny lag.",
                fix: "<li>Friction: 0</li><li>Sens: 40/60</li>"
            },
            "fh3": {
                title: "Forza Horizon 3", version: "Xbox One S", badge: "Playable", bColor: "badge-yellow",
                lag: "Moderate", lagC: "text-yellow", fps: "30 FPS", dz: "Standard", dzC: "text-green",
                desc: "Stabilne 30 klatek, odczuwalny lag w sterowaniu.",
                fix: "<li>Deadzone: 0</li>"
            },
            "ac": {
                title: "Assassin's Creed", version: "Xbox 360 Enhanced", badge: "Perfect", bColor: "badge-green",
                lag: "Low", lagC: "text-green", fps: "60 FPS", dz: "Small", dzC: "text-green",
                desc: "Idealna płynność i responsywność.",
                fix: "<li>Brak zmian.</li>"
            }
        };

        function toggleGameList() {
            document.getElementById('game-list-overlay').classList.toggle('open');
        }

        function closeGameList() {
            document.getElementById('game-list-overlay').classList.remove('open');
        }

        function loadGame(id) {
            const g = db[id];
            document.getElementById('v-title').innerText = g.title;
            document.getElementById('v-version').innerText = g.version;
            document.getElementById('v-badge').innerText = g.badge;
            document.getElementById('v-badge').className = "status-badge " + g.bColor;
            document.getElementById('v-lag').innerText = g.lag;
            document.getElementById('v-lag').className = "stat-value underline " + g.lagC;
            document.getElementById('v-fps').innerText = g.fps;
            document.getElementById('v-deadzone').innerText = g.dz;
            document.getElementById('v-deadzone').className = "stat-value " + g.dzC;
            document.getElementById('v-desc').innerText = g.desc;
            document.getElementById('v-fix').innerHTML = g.fix;
            document.getElementById('v-fix-container').style.display = "block";
            closeGameList();
        }

        const container = document.getElementById('game-buttons-container');
        for (let key in db) {
            let b = document.createElement('button');
            b.className = "game-select-btn";
            b.innerText = db[key].title;
            b.onclick = (e) => { e.stopPropagation(); loadGame(key); };
            container.appendChild(b);
        }
    </script>
</body>
</html>
